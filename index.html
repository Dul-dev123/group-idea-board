<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Idea Board</title>
    <style>
        /* Part 5 - Improve the Appearance & Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9; /* Background design [cite: 58] */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: #0056b3; /* Blue header [cite: 5, 55] */
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px; /* Better layout and spacing [cite: 47] */
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        select, input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        select { flex: 1; }
        input { flex: 2; }

        button {
            padding: 12px 20px;
            background-color: #0056b3; /* Visually appealing button [cite: 50] */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #004494;
        }

        .stats {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 15px;
            font-weight: bold; /* Total number of ideas section [cite: 59] */
        }

        ul {
            list-style: none; /* Clear list layout [cite: 49] */
            padding: 0;
        }

        li {
            background: #f9f9f9;
            margin-bottom: 8px;
            padding: 12px;
            border-left: 5px solid #0056b3;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.8rem;
            color: #888; /* Footer section [cite: 56] */
        }
    </style>
</head>
<body>

    <header>
        <h1>Group Idea Board</h1>
    </header>

    <div class="container">
        <div class="stats">
            Total Ideas: <span id="ideaCount">0</span>
        </div>

        <div class="input-group">
            <select id="userName">
                <option value="" disabled selected>Select your name...</option>
                <option value="Dulina">Dulina</option>
                <option value="Binu">Binu</option>
                <option value="Kishan">Kishan</option>
                <option value="Rawana">Rawana</option>
                <option value="Sithupa">Sithupa</option>
            </select>
            
            <input type="text" id="ideaInput" placeholder="Enter your idea here...">
            <button onclick="addIdea()">Add Idea</button>
        </div>

        <ul id="ideaList">
            </ul>

        <button onclick="resetInputs()" style="background-color: #6c757d; margin-top: 10px; font-size: 12px;">Clear Inputs</button>
    </div>

    <footer>
        &copy; 2026 Project Day 03 - Collaborative Idea Board
    </footer>

    <script>
        let count = 0;

        function addIdea() {
            const name = document.getElementById('userName').value;
            const idea = document.getElementById('ideaInput').value;
            const list = document.getElementById('ideaList');
            const countDisplay = document.getElementById('ideaCount');

            if (name === "" || idea.trim() === "") {
                alert("Please select a name and enter an idea!");
                return;
            }

            // Create list item [cite: 43]
            const li = document.createElement('li');
            li.innerHTML = `<span><strong>${idea}</strong> — <small>suggested by ${name}</small></span>`;
            
            list.appendChild(li);

            // Update counter [cite: 59]
            count++;
            countDisplay.innerText = count;

            // Clear input field [cite: 59]
            document.getElementById('ideaInput').value = "";
        }

        function resetInputs() {
            document.getElementById('userName').selectedIndex = 0;
            document.getElementById('ideaInput').value = "";
        }
    </script>
</body>
</html>
